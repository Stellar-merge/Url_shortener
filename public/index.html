<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZapLink - Fast & Beautiful URL Shortener</title>
  <meta name="description" content="Generate short URLs instantly with ZapLink's blazingly fast and beautiful URL shortener.">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background">
    <div class="blob shape1"></div>
    <div class="blob shape2"></div>
    <div class="blob shape3"></div>
  </div>

  <main class="container glass-panel">
    <header>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zap"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
        <h1>ZapLink</h1>
      </div>
      <p class="subtitle">Shorten your long links instantly.</p>
    </header>

    <section class="shortener-section">
      <form id="shortenForm" class="shortener-form">
        <div class="input-wrapper">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
          <input 
            type="url" 
            id="urlInput" 
            placeholder="https://your-very-long-url.com/something" 
            required
            autocomplete="off"
          >
        </div>
        <button type="submit" id="submitBtn" class="btn-primary">
          <span class="btn-text">Shorten</span>
          <div class="loader hidden" id="spinner"></div>
        </button>
      </form>

      <div id="errorMessage" class="error-message hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="errorText">Please enter a valid URL</span>
      </div>

      <div id="resultContainer" class="result-container hidden">
        <p class="result-label">Your shortened URL is ready:</p>
        <div class="result-box">
          <a href="#" id="shortLink" target="_blank" rel="noopener noreferrer">http://localhost:3000/xyz123</a>
          <button id="copyBtn" class="btn-icon" aria-label="Copy to clipboard" title="Copy">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>
        </div>
        <div class="success-toast hidden" id="copyToast">Copied to clipboard!</div>
      </div>
    </section>

    <footer>
      <p>ZapLink &copy; 2026. Made with ❤️ using Node.js & Express</p>
    </footer>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('shortenForm');
      const urlInput = document.getElementById('urlInput');
      const submitBtn = document.getElementById('submitBtn');
      const btnText = submitBtn.querySelector('.btn-text');
      const spinner = document.getElementById('spinner');
      const errorMessage = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      const resultContainer = document.getElementById('resultContainer');
      const shortLink = document.getElementById('shortLink');
      const copyBtn = document.getElementById('copyBtn');
      const copyToast = document.getElementById('copyToast');

      const setLoading = (isLoading) => {
        if (isLoading) {
          submitBtn.disabled = true;
          btnText.classList.add('hidden');
          spinner.classList.remove('hidden');
        } else {
          submitBtn.disabled = false;
          btnText.classList.remove('hidden');
          spinner.classList.add('hidden');
        }
      };

      const showError = (message) => {
        errorText.textContent = message;
        errorMessage.classList.remove('hidden');
        resultContainer.classList.add('hidden');
      };

      const hideError = () => {
        errorMessage.classList.add('hidden');
      };

      const showResult = (url) => {
        shortLink.href = url;
        shortLink.textContent = url;
        resultContainer.classList.remove('hidden');
        hideError();
      };

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const originalUrl = urlInput.value.trim();
        
        if (!originalUrl) return;

        setLoading(true);
        hideError();
        resultContainer.classList.add('hidden');

        try {
          const response = await fetch('/api/shorten', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ originalUrl })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || 'Failed to shorten URL');
          }

          showResult(data.shortUrl);
        } catch (error) {
          showError(error.message);
        } finally {
          setLoading(false);
        }
      });

      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(shortLink.href);
          
          // Changing icon to checkmark
          const originalIcon = copyBtn.innerHTML;
          copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
          
          copyToast.classList.remove('hidden');
          copyToast.style.opacity = '1';
          
          setTimeout(() => {
            copyBtn.innerHTML = originalIcon;
            copyToast.style.opacity = '0';
            setTimeout(() => {
              copyToast.classList.add('hidden');
            }, 300);
          }, 2000);
        } catch (err) {
          console.error('Failed to copy!', err);
        }
      });
    });
  </script>
</body>
</html>
